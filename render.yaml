services:
  - type: web
    name: loopgame
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: loopgame-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: loopgame-db
    plan: free
